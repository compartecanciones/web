<html lang="es">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comparte Canciones — Próximamente</title>
    <meta name="description" content="Comparte Canciones — Si te pasó, ya tiene canción. Canciones originales sobre la vida cotidiana.">
    <link rel="icon" type="image/jpeg" href="logo.jpg">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,700;1,9..40,400&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --black: #0A0A0A;
            --yellow: #F5C518;
            --yellow-hover: #FFD84D;
            --white: #FFFFFF;
            --gray-light: #9A9A9A;
            --gray-dark: #2A2A2A;
        }

        body {
            background-color: var(--black);
            color: var(--white);
            font-family: 'Helvetica Neue', 'DM Sans', Helvetica, Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 32px;
            max-width: 480px;
            width: 100%;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Logo container */
        .logo-wrapper {
            background: var(--white);
            border-radius: 28px;
            width: 160px;
            height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 60px rgba(245, 197, 24, 0.15);
            animation: fadeIn 1s ease-out 0.2s both;
        }

        .logo-wrapper img {
            width: 120px;
            height: 120px;
            object-fit: contain;
        }

        /* Brand name */
        .brand-name {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--white);
            text-align: center;
            animation: fadeIn 1s ease-out 0.4s both;
        }

        /* Próximamente */
        .coming-soon {
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: var(--gray-light);
            text-align: center;
            animation: fadeIn 1s ease-out 0.6s both;
        }

        /* Divider */
        .divider {
            width: 48px;
            height: 3px;
            background: var(--yellow);
            border-radius: 2px;
            animation: fadeIn 1s ease-out 0.8s both;
        }

        /* Social CTA text */
        .social-cta {
            font-size: 15px;
            font-weight: 400;
            color: var(--gray-light);
            text-align: center;
            animation: fadeIn 1s ease-out 1s both;
        }

        /* Social buttons */
        .social-buttons {
            display: flex;
            flex-direction: row;
            gap: 14px;
            width: 100%;
            justify-content: center;
            animation: fadeIn 1s ease-out 1.2s both;
        }

        .social-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            background: var(--yellow);
            color: var(--black);
            text-decoration: none;
            padding: 14px 24px;
            border-radius: 50px;
            font-family: 'Helvetica Neue', 'DM Sans', Helvetica, Arial, sans-serif;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: -0.2px;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .social-btn:hover {
            background: var(--yellow-hover);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(245, 197, 24, 0.25);
        }

        .social-btn:active {
            transform: translateY(0);
        }

        .social-btn svg {
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        /* Responsive */
        @media (max-width: 520px) {
            .social-buttons {
                flex-direction: column;
                align-items: center;
            }

            .social-btn {
                width: 100%;
                max-width: 280px;
                justify-content: center;
            }

            .logo-wrapper {
                width: 130px;
                height: 130px;
                border-radius: 24px;
            }

            .logo-wrapper img {
                width: 96px;
                height: 96px;
            }

            .brand-name {
                font-size: 24px;
            }

            .coming-soon {
                font-size: 16px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Logo -->
        <div class="logo-wrapper">
            <img src="logo.jpg" alt="Comparte Canciones logo">
        </div>

        <!-- Brand name -->
        <h1 class="brand-name">Comparte Canciones</h1>

        <!-- Próximamente -->
        <p class="coming-soon">próximamente...</p>

        <!-- Divider -->
        <div class="divider"></div>

        <!-- Social CTA -->
        <p class="social-cta">Mientras, síguenos en redes sociales</p>

        <!-- Social Buttons -->
        <div class="social-buttons">
            <!-- Instagram -->
            <a href="https://instagram.com/compartecanciones" target="_blank" rel="noopener noreferrer" class="social-btn">

                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.27 6.27 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.34-6.34V9.17a8.16 8.16 0 004.77 1.52V7.24a4.85 4.85 0 01-1.01-.55z" fill="currentColor"/>

                @compartecanciones
            </a>
        </div>
    </div>
</body>
